<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="-apple-system, system-ui, Segoe UI, sans-serif">
  <rect width="420" height="240" fill="#ffffff"/>
  <!-- tresse (thick, left) -->
  <line x1="24" y1="120" x2="170" y2="120" stroke="#1a201c" stroke-width="4"/>
  <!-- fluorocarbone (thin, right) -->
  <line x1="250" y1="120" x2="396" y2="120" stroke="#4a5d52" stroke-width="2"/>
  <!-- the join: interlocking wraps (uni-to-uni / barrel schematic) -->
  <g stroke="#1d6e42" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M170,120 q6,-14 18,0 q6,14 18,0 q6,-14 18,0"/>
    <path d="M188,120 q6,14 18,0 q6,-14 18,0 q6,14 18,0"/>
  </g>
  <circle cx="210" cy="120" r="3" fill="#1d6e42"/>
  <!-- brackets under each line -->
  <g stroke="#c9c3b4" stroke-width="1">
    <path d="M40,138 v10 h120 v-10" fill="none"/>
    <path d="M260,138 v10 h120 v-10" fill="none"/>
    <line x1="210" y1="104" x2="210" y2="70"/>
  </g>
  <!-- labels -->
  <g font-size="13" fill="#3a3e36">
    <text x="100" y="170" text-anchor="middle">Tresse</text>
    <text x="100" y="188" font-size="11" fill="#8a8676" text-anchor="middle">(corps de ligne)</text>
    <text x="320" y="170" text-anchor="middle">Fluorocarbone</text>
    <text x="320" y="188" font-size="11" fill="#8a8676" text-anchor="middle">(bas de ligne, discret)</text>
    <text x="210" y="62" text-anchor="middle" fill="#1d6e42" font-weight="600">Nœud raccord</text>
    <text x="210" y="46" text-anchor="middle" font-size="11" fill="#8a8676">baril / uni-to-uni</text>
  </g>
</svg>
