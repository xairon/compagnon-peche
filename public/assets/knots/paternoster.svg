<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="-apple-system, system-ui, Segoe UI, sans-serif">
  <rect width="420" height="320" fill="#ffffff"/>
  <!-- surface -->
  <line x1="24" y1="34" x2="250" y2="34" stroke="#9db4c4" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="24" y="26" font-size="12" fill="#8a96a0">Surface</text>
  <!-- bottom -->
  <line x1="24" y1="286" x2="396" y2="286" stroke="#c9b98f" stroke-width="2"/>
  <g stroke="#d8cca6" stroke-width="1.5">
    <line x1="40" y1="286" x2="30" y2="300"/><line x1="90" y1="286" x2="80" y2="300"/>
    <line x1="140" y1="286" x2="130" y2="300"/><line x1="190" y1="286" x2="180" y2="300"/>
    <line x1="240" y1="286" x2="230" y2="300"/><line x1="290" y1="286" x2="280" y2="300"/>
    <line x1="330" y1="286" x2="320" y2="300"/>
  </g>
  <text x="336" y="304" font-size="12" fill="#a99a6f">Fond</text>
  <!-- main line -->
  <line x1="140" y1="34" x2="140" y2="272" stroke="#1a201c" stroke-width="2"/>
  <circle cx="140" cy="48" r="4" fill="none" stroke="#1a201c" stroke-width="1.6"/>
  <!-- potence (dropper) with swivel -->
  <circle cx="140" cy="140" r="5" fill="none" stroke="#1a201c" stroke-width="1.6"/>
  <path d="M145,140 q40,4 62,20" fill="none" stroke="#1d6e42" stroke-width="2.2"/>
  <!-- hook + vif at end of dropper -->
  <path d="M207,160 a10,10 0 1 1 -6,9" fill="none" stroke="#1d6e42" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M201,169 l-6,-2 3,-6 z" fill="#1d6e42"/>
  <ellipse cx="224" cy="150" rx="20" ry="9" fill="#e7efe9" stroke="#1d6e42" stroke-width="1.6"/>
  <circle cx="240" cy="148" r="1.6" fill="#1d6e42"/>
  <!-- weight at bottom -->
  <path d="M140,272 q-12,11 0,28 q12,-17 0,-28 z" fill="#3a3e36"/>
  <!-- labels -->
  <g font-size="12.5" fill="#3a3e36">
    <line x1="140" y1="90" x2="250" y2="90" stroke="#c9c3b4" stroke-width="1"/>
    <text x="256" y="94">Corps de ligne</text>
    <line x1="150" y1="140" x2="300" y2="112" stroke="#c9c3b4" stroke-width="1"/>
    <text x="306" y="108">Potence + émerillon</text>
    <text x="306" y="124" font-size="11" fill="#8a8676">(évite l'emmêlage)</text>
    <line x1="228" y1="150" x2="300" y2="176" stroke="#c9c3b4" stroke-width="1"/>
    <text x="306" y="180">Hameçon + vif</text>
    <line x1="140" y1="286" x2="250" y2="252" stroke="#c9c3b4" stroke-width="1"/>
    <text x="256" y="248">Plomb au fond</text>
  </g>
</svg>
