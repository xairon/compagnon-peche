<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" font-family="-apple-system, system-ui, Segoe UI, sans-serif">
  <rect width="420" height="320" fill="#ffffff"/>
  <!-- surface -->
  <line x1="24" y1="34" x2="250" y2="34" stroke="#9db4c4" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="24" y="26" font-size="12" fill="#8a96a0">Surface</text>
  <!-- bottom -->
  <line x1="24" y1="286" x2="396" y2="286" stroke="#c9b98f" stroke-width="2"/>
  <g stroke="#d8cca6" stroke-width="1.5">
    <line x1="40" y1="286" x2="30" y2="300"/><line x1="80" y1="286" x2="70" y2="300"/>
    <line x1="120" y1="286" x2="110" y2="300"/><line x1="160" y1="286" x2="150" y2="300"/>
    <line x1="200" y1="286" x2="190" y2="300"/><line x1="240" y1="286" x2="230" y2="300"/>
    <line x1="280" y1="286" x2="270" y2="300"/><line x1="320" y1="286" x2="310" y2="300"/>
  </g>
  <text x="330" y="304" font-size="12" fill="#a99a6f">Fond</text>
  <!-- main line -->
  <line x1="150" y1="34" x2="150" y2="270" stroke="#1a201c" stroke-width="2"/>
  <circle cx="150" cy="48" r="4" fill="none" stroke="#1a201c" stroke-width="1.6"/>
  <!-- hook tied mid-line, point up (palomar) -->
  <path d="M150,150 h34 a10,10 0 0 1 10,10 v10 a14,14 0 0 1 -26,4" fill="none" stroke="#1d6e42" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M168,178 l-3,-7 6,0 z" fill="#1d6e42"/>
  <!-- soft lure on hook -->
  <path d="M184,160 q28,-6 40,4 q-24,10 -40,2 z" fill="#e7efe9" stroke="#1d6e42" stroke-width="1.6"/>
  <!-- weight at bottom -->
  <path d="M150,270 q-11,10 0,26 q11,-16 0,-26 z" fill="#3a3e36"/>
  <!-- labels -->
  <g font-size="12.5" fill="#3a3e36">
    <line x1="150" y1="95" x2="250" y2="95" stroke="#c9c3b4" stroke-width="1"/>
    <text x="256" y="99">Corps de ligne</text>
    <line x1="196" y1="150" x2="300" y2="132" stroke="#c9c3b4" stroke-width="1"/>
    <text x="306" y="128">Hameçon (palomar,</text>
    <text x="306" y="144">pointe vers le haut)</text>
    <line x1="224" y1="164" x2="300" y2="176" stroke="#c9c3b4" stroke-width="1"/>
    <text x="306" y="180">Leurre souple</text>
    <line x1="150" y1="284" x2="250" y2="250" stroke="#c9c3b4" stroke-width="1"/>
    <text x="256" y="246">Plomb en bout</text>
    <text x="256" y="262" font-size="11" fill="#8a8676">(règle la hauteur)</text>
  </g>
</svg>
